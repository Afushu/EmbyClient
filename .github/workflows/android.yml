name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug > build_log.txt 2>&1
      
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: EmbyClient-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload build log to termbin
      if: failure()
      run: |
        cat build_log.txt | nc termbin.com 9999 > url.txt
        echo "::error::Build log URL: $(cat url.txt)"
