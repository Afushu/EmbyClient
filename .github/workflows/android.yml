name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug > build_log.txt 2>&1
      
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: EmbyClient-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Commit build log on failure
      if: failure()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add build_log.txt
        git commit -m "Add build log [skip ci]" || echo "No changes to commit"
        git push
